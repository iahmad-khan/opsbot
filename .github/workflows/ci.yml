name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-backend:
    name: Lint & Type-check Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy type check
        run: mypy src/opsbot/ --ignore-missing-imports

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opsbot
          POSTGRES_PASSWORD: opsbot
          POSTGRES_DB: opsbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://opsbot:opsbot@localhost:5432/opsbot_test
      DATABASE_URL_SYNC: postgresql://opsbot:opsbot@localhost:5432/opsbot_test
      REDIS_URL: redis://localhost:6379/0
      SLACK_BOT_TOKEN: xoxb-test
      SLACK_APP_TOKEN: xapp-test
      SLACK_SIGNING_SECRET: test-secret
      ANTHROPIC_API_KEY: test-key
      SECRET_KEY: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv pip install --system -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --cov=opsbot --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  build-mcp-servers:
    name: Build MCP Servers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [argocd-mcp, prometheus-mcp, datadog-mcp, opensearch-mcp]
    defaults:
      run:
        working-directory: mcp-servers/${{ matrix.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
