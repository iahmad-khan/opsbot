name: Release & Deploy

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/opsbot

jobs:
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
            image: backend
          - name: frontend
            context: frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-mcp:
    name: Build & Push MCP Server Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        server: [argocd-mcp, prometheus-mcp, datadog-mcp, opensearch-mcp]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.server }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Build MCP server
        run: |
          cd mcp-servers/${{ matrix.server }}
          npm ci && npm run build
          cat > Dockerfile << 'EOF'
          FROM node:20-alpine
          WORKDIR /app
          COPY package*.json ./
          RUN npm ci --omit=dev
          COPY dist/ ./dist/
          CMD ["node", "dist/index.js"]
          EOF
      - uses: docker/build-push-action@v6
        with:
          context: mcp-servers/${{ matrix.server }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to Kubernetes
    needs: [build-push, build-push-mcp]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.16.0"

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Helm upgrade
        run: |
          helm upgrade --install opsbot ./charts/opsbot \
            --namespace opsbot \
            --create-namespace \
            --set image.tag=${{ steps.version.outputs.VERSION }} \
            --set frontendImage.tag=${{ steps.version.outputs.VERSION }} \
            --set workerImage.tag=${{ steps.version.outputs.VERSION }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend \
            --set frontendImage.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend \
            --set workerImage.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend \
            --wait \
            --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/opsbot-backend -n opsbot
          kubectl rollout status deployment/opsbot-worker -n opsbot
