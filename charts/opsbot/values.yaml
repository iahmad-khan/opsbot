replicaCount: 2

image:
  repository: your-registry/opsbot-backend
  tag: "0.2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: opsbot.example.com
      paths:
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: opsbot-tls
      hosts:
        - opsbot.example.com

resources:
  backend:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

postgresql:
  enabled: true
  auth:
    database: opsbot
    username: opsbot
    existingSecret: opsbot-postgres-secret
    secretKeys:
      adminPasswordKey: postgresql-password
      userPasswordKey: postgresql-password
  primary:
    persistence:
      size: 20Gi

redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: opsbot-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      size: 5Gi
    config: |
      appendonly yes
      appendfsync everysec

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 30s

grafanaDashboard:
  enabled: true
  namespace: monitoring

env:
  APP_ENV: production
  LOG_LEVEL: INFO
  LITELLM_DEFAULT_MODEL: claude-sonnet-4-6

# Secret name that holds ANTHROPIC_API_KEY, SLACK_BOT_TOKEN, etc.
secretName: opsbot-secrets

livenessProbe:
  httpGet:
    path: /alive
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ─────────────────────────────────────────────────────────────────────────────
# KAGENT configuration
# ─────────────────────────────────────────────────────────────────────────────
kagent:
  # Set to true to install the KAGENT controller (CRDs, controller pod, A2A endpoint).
  enabled: true

  # LLM model for all agents.
  model: claude-sonnet-4-6

# ─────────────────────────────────────────────────────────────────────────────
# KAGENT bundled tool server (subchart: kagent-tools)
# Provides: kubectl, helm, prometheus, grafana, argo-rollouts, cilium, istio,
#           shell, datetime — all in a single pod at port 8084.
# Image: ghcr.io/kagent-dev/kagent/tools
# ─────────────────────────────────────────────────────────────────────────────
# ─────────────────────────────────────────────────────────────────────────────
# kagent-tools subchart — KAGENT official tool server
# Values here are passed directly to the kagent-tools sub-chart.
# Image: ghcr.io/kagent-dev/kagent/tools (port 8084)
# Docs:  https://github.com/kagent-dev/tools
# ─────────────────────────────────────────────────────────────────────────────
kagent-tools:
  enabled: true

  tools:
    # ── Kubernetes ─────────────────────────────────────────────────────────
    # Auto-discovery: the kubeconfig secret (see below) is mounted at
    # /root/.kube/config so all contexts in it are available immediately.
    # The agent discovers them at runtime with get_cluster_configuration —
    # no static context list is needed.
    k8s:
      tokenPassthrough: false   # set true to proxy the caller's Bearer token

    # ── Prometheus ─────────────────────────────────────────────────────────
    prometheus:
      url: "http://prometheus.monitoring.svc.cluster.local:9090"
      username: ""
      password: ""   # basic-auth only if Prometheus requires it

    # ── Grafana ────────────────────────────────────────────────────────────
    grafana:
      url: "http://grafana.monitoring.svc.cluster.local:3000"
      apiKey: ""     # Grafana service-account token with Editor role

    # Which tool categories to load (empty = all — recommended)
    enabledTools: []

  rbac:
    readOnly: false   # set true to deploy a read-only ClusterRole

  # ── Multi-cluster kubeconfig ──────────────────────────────────────────────
  # Mount a kubeconfig Secret that contains all cluster contexts.
  # The tool server reads it at startup; KAGENT agents discover contexts via
  # get_cluster_configuration and pass --context <name> to kubectl tools.
  #
  # Create the secret once per cluster:
  #   kubectl create secret generic opsbot-kubeconfig \
  #     --from-file=config=$HOME/.kube/config \
  #     -n opsbot
  #
  # For EKS/GKE token refresh to work inside the pod, merge all cluster
  # entries into one kubeconfig and include static credentials or an
  # exec-based auth provider that works without cloud CLI tools.
  # Recommended: use static bearer tokens from ServiceAccounts in each cluster.
  extraVolumes:
    - name: kubeconfig
      secret:
        secretName: opsbot-kubeconfig
        optional: true   # pod starts normally even if secret does not exist
  extraVolumeMounts:
    - name: kubeconfig
      mountPath: /root/.kube
      readOnly: true
  extraEnv:
    - name: KUBECONFIG
      value: /root/.kube/config

# ─────────────────────────────────────────────────────────────────────────────
# MCP server pods for tools NOT bundled in kagent-tools
# (Kubernetes, ArgoCD, Prometheus are now handled by kagentTools above)
# ─────────────────────────────────────────────────────────────────────────────
mcpServers:
  # GitHub — official GitHub MCP server (maintained by GitHub, Inc.)
  github:
    image:
      repository: ghcr.io/github/github-mcp-server
      tag: latest
      pullPolicy: Always

  # Datadog — no KAGENT official image yet
  datadog:
    image:
      repository: your-registry/opsbot-datadog-mcp
      tag: "0.2.0"
      pullPolicy: IfNotPresent
    site: datadoghq.com

  # Jira — no KAGENT official image yet
  jira:
    image:
      repository: your-registry/opsbot-jira-mcp
      tag: "0.2.0"
      pullPolicy: IfNotPresent

  # Kubernetes — KAGENT's official kubectl tool server (replaces strowk/mcp-k8s-go)
  kubernetes:
    image:
      repository: ghcr.io/kagent-ai/tools/kubectl
      tag: latest
      pullPolicy: Always
